# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║  CI/CD PIPELINE - NEW LIFE MONOREPO                                           ║
# ║                                                                               ║
# ║  FLUJO:                                                                       ║
# ║  ┌──────────┐     ┌──────────┐     ┌──────────┐                              ║
# ║  │  PUSH    │────▶│  BUILD   │────▶│  DEPLOY  │                              ║
# ║  │  to main │     │  + check │     │  Vercel  │                              ║
# ║  └──────────┘     └──────────┘     └──────────┘                              ║
# ║                                                                               ║
# ║  NOTA: Vercel también hace auto-deploy. Este pipeline añade:                 ║
# ║        - Type checking antes de deploy                                        ║
# ║        - Audit de seguridad                                                   ║
# ║        - Control manual del proceso                                           ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'

jobs:
  # ════════════════════════════════════════════════════════════════
  # BUILD: Instala, valida tipos, compila
  # ════════════════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (non-blocking)
        run: npm run check || echo "Type check has warnings (build will verify)"
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════
  # SECURITY: Audita dependencias (BLOQUEA si hay high/critical)
  # ════════════════════════════════════════════════════════════════
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Security Audit (High/Critical)
        run: npm audit --audit-level=high

      - name: Check for known vulnerabilities
        run: |
          echo "## Security Audit Results" >> $GITHUB_STEP_SUMMARY
          npm audit --json | jq -r '.metadata.vulnerabilities | "- Critical: \(.critical)\n- High: \(.high)\n- Moderate: \(.moderate)\n- Low: \(.low)"' >> $GITHUB_STEP_SUMMARY || echo "No vulnerabilities found" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # DEPLOY: Vercel con mejores secrets y retry
  # ════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Secrets
        run: |
          echo "Checking Vercel secrets..."
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then echo "❌ VERCEL_TOKEN not set"; exit 1; fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then echo "❌ VERCEL_ORG_ID not set"; exit 1; fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then echo "❌ VERCEL_PROJECT_ID not set"; exit 1; fi
          echo "✅ All secrets present"

      - name: Deploy to Vercel
        id: vercel-deploy
        uses: amondnet/vercel-action@v25
        continue-on-error: true
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Check Deployment Status
        if: steps.vercel-deploy.outcome == 'failure'
        run: |
          echo "## 🚨 Vercel Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The deployment failed. This usually means:" >> $GITHUB_STEP_SUMMARY
          echo "1. Vercel secrets are not configured in GitHub" >> $GITHUB_STEP_SUMMARY
          echo "2. Secrets are incorrect or expired" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### To fix:" >> $GITHUB_STEP_SUMMARY
          echo "1. Get your Vercel credentials from vercel.com" >> $GITHUB_STEP_SUMMARY
          echo "2. Add them to GitHub: Settings > Secrets and variables > Actions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See .env.vercel.template for the required variables" >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: Deployment Success
        if: steps.vercel-deploy.outcome == 'success'
        run: |
          echo "## ✅ Successfully deployed to Vercel" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 Your site is live at: https://www.newlifesolutions.dev" >> $GITHUB_STEP_SUMMARY
