name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Tier 1: Lightning Smoke Tests (2-3 minutes)
  smoke-tests:
    name: ⚡ Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Run smoke tests
        run: npx playwright test tools-smoke-light --project=chromium
        working-directory: ./apps/web

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: apps/web/playwright-report/
          retention-days: 7

  # Tier 1: Full Smoke Tests (5-8 minutes)
  full-smoke:
    name: 🔥 Full Smoke Tests
    needs: smoke-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Run full smoke tests
        run: npx playwright test tools-smoke --project=chromium
        working-directory: ./apps/web

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-smoke-test-results
          path: apps/web/playwright-report/
          retention-days: 7

  # Tier 2: Critical Path Tests (20-30 minutes)
  critical-path:
    name: 🔥 Critical Path E2E
    needs: full-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Generate test fixtures
        run: node tests/fixtures/generate-fixtures.cjs
        working-directory: ./apps/web

      - name: Run critical path tests
        run: npx playwright test critical-path --project=chromium
        working-directory: ./apps/web

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: critical-path-results
          path: apps/web/playwright-report/
          retention-days: 14

  # Type checking
  type-check:
    name: 🔍 Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run check
        working-directory: ./apps/web

  # Linting
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        working-directory: ./apps/web
        continue-on-error: true

  # Security audit
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: ./apps/web
        continue-on-error: true
